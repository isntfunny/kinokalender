name: Update Kinostarts Kalender

on:
  schedule:
    - cron: '0 6 * * *'  # täglich 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - '**.py'
      - '.github/workflows/**.yml'
      - 'requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repository klonen
        uses: actions/checkout@v4

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Python-Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: 💾 Scrapling-Browser cachen
        id: scrapling-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/camoufox
            ~/.cache/ms-playwright
          key: scrapling-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: 🌐 Scrapling-Fetcher-Dependencies installieren (falls nicht gecacht)
        if: steps.scrapling-cache.outputs.cache-hit != 'true'
        run: scrapling install

      - name: 🧪 Kinostarts-Skript ausführen
        run: python kinostarts.py

      - name: 🚀 ICS-Datei veröffentlichen
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add kinostarts.ics
          git diff --staged --quiet && echo "Keine Änderungen" || (git commit -m "🔄 Update Kalender" && git push)
